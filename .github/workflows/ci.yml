name: CI

# CC/CX/Roo 面向的引擎脚本与安装器自 V9 起封顶冻结（V10 起对齐 Vesicle，不再产出
# Roo/CC/CX 协议包）。冻结产物继续执行轻量静态检查；V10 共享规则资产执行 Bun
# 契约测试、黄金语料与 Harness Pack 可复现构建。

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rule-assets:
    name: Rule Assets and Vesicle Harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Validate rule sources and generated guidance
        run: |
          bun shared/rule-assets/scripts/check.ts
          bun shared/prism-driver/scripts/check.ts

      - name: Run rule asset and Prism Driver tests
        run: bun test shared/rule-assets/tests shared/prism-driver/tests

      - name: Build Harness Pack twice
        run: |
          bun shared/rule-assets/scripts/build-harness.ts --out dev/build/prism-vesicle-harness
          bun shared/rule-assets/scripts/build-harness.ts --out dev/build/prism-vesicle-harness-repeat
          diff -rq dev/build/prism-vesicle-harness dev/build/prism-vesicle-harness-repeat

      - name: Upload Vesicle Harness Pack
        uses: actions/upload-artifact@v4
        with:
          name: prism-vesicle-harness-v10
          path: dev/build/prism-vesicle-harness
          if-no-files-found: error

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Lint tracked shell scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.sh')
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No tracked shell scripts found."
            exit 0
          fi
          shellcheck "${files[@]}"

  bash-structure:
    name: Bash Structure Check (${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine:
          - Prism-Engine-Codex
          - Prism-Engine-Claude-Code
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate engine directory tree
        shell: bash
        run: |
          set -euo pipefail
          engine_root="03_Modulation/${{ matrix.engine }}"
          bash "$engine_root/scripts/validate_codex_tree.sh"

  powershell-parse:
    name: PowerShell Parse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tracked PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = git ls-files '*.ps1'
          if (-not $files) {
            Write-Host 'No tracked PowerShell scripts found.'
            exit 0
          }

          $parseFailures = @()
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref] $tokens,
              [ref] $errors
            ) | Out-Null

            if ($errors.Count -gt 0) {
              $detail = $errors | ForEach-Object { $_.Message }
              $parseFailures += "$file`n - $($detail -join "`n - ")"
            }
          }

          if ($parseFailures.Count -gt 0) {
            throw "PowerShell parse failures:`n$($parseFailures -join "`n")"
          }

  installer-structure:
    name: Installer Structure Check (${{ matrix.installer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - installer: Prism-Engine-V7.x-Installer
            template: Prism-Engine-Universe-V7.0-Template
          - installer: Prism-Engine-V8.x-Installer
            template: Prism-Engine-Universe-V8.0-Template
          - installer: Prism-Engine-V9.x-Installer
            template: Prism-Engine-V9.x-Template
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse installer and verify layout
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $installerRoot = Join-Path (Get-Location) '03_Modulation/${{ matrix.installer }}'
          $installerScript = Join-Path $installerRoot 'Install.ps1'

          if (-not (Test-Path $installerScript)) {
            throw "Installer script not found: $installerScript"
          }

          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            $installerScript,
            [ref] $tokens,
            [ref] $errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $detail = $errors | ForEach-Object { $_.Message }
            throw "Installer parse failed:`n - $($detail -join "`n - ")"
          }

          $templatePath = Join-Path $installerRoot '${{ matrix.template }}'
          if (-not (Test-Path $templatePath)) {
            throw "Expected template directory is missing: $templatePath"
          }
