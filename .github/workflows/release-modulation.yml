name: Release Modulation

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example modulation-20260329-1"
        required: true
        type: string
      title:
        description: "Release title"
        required: true
        type: string
      notes:
        description: "Optional release notes"
        required: false
        type: string
      notes_source:
        description: "manual | changelog | commits | auto"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - changelog
          - commits
          - manual
      prerelease:
        description: "Mark this release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & ./.github/scripts/package-tracked-assets.ps1 `
            -ManifestPath '.github/release/modulation-packages.json' `
            -OutputDir (Join-Path $env:RUNNER_TEMP 'modulation-release')

      - name: Generate Modulation release notes
        shell: pwsh
        env:
          USER_NOTES: ${{ inputs.notes }}
        run: |
          $ErrorActionPreference = 'Stop'
          & ./.github/scripts/generate-release-notes.ps1 `
            -ReleaseClass modulation `
            -NotesSource '${{ inputs.notes_source }}' `
            -Tag '${{ inputs.tag }}' `
            -UserNotes $env:USER_NOTES `
            -OutputPath (Join-Path $env:RUNNER_TEMP 'modulation-release-notes.md')

      - name: Create or update Modulation release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_TITLE: ${{ inputs.title }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          asset_dir="$RUNNER_TEMP/modulation-release"
          notes_file="$RUNNER_TEMP/modulation-release-notes.md"

          shopt -s nullglob
          assets=("$asset_dir"/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No Modulation assets were generated." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file "$notes_file"
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            create_args=("$RELEASE_TAG" "${assets[@]}" --title "$RELEASE_TITLE" --notes-file "$notes_file" --target "$GITHUB_SHA")
            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}"
          fi
